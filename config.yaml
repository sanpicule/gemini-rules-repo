# このファイルは、Gemini CLIのグローバルな設定を定義します。
# 主に、CLIの操作対象から除外するファイルやディレクトリのパターンを指定するために使用されます。
# これにより、node_modulesやビルド成果物などを無視し、ソースコードのみに集中させることができます。

# Gemini CLI グローバル設定

# コード支援、ファイル検索、その他の操作中に無視するパターンのリスト。
# これにより、CLIのコンテキストを関連するソースコードに集中させることができます。
ignore_patterns:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.git/**"
  - "**/*.log"
  - "**/coverage/**"
  - "**/.DS_Store"
  - "**/Thumbs.db"
