description = "新しい機能ブランチと定型ファイルを作成します。"

prompt = """
新しい機能を開発するためのブランチとファイル構造を作成してください。
コマンドの引数として機能名が渡されます（例: `/new-feature user-authentication`）。

# 手順

1. 引数から機能名を取得してください。
   - 引数が指定されていない場合は、機能名の入力を求めてください。

2. 以下のコマンドで新しいブランチを作成してください。
   ```
   git checkout -b feature/<機能名>
   ```
   - 既にブランチが存在する場合はそのブランチに切り替えてください。

3. 以下のディレクトリ構造を作成してください。
   ```
   src/features/<機能名>/
   ├── index.js        # エントリーポイント
   ├── <機能名>.js     # メインロジック
   └── <機能名>.test.js # テストファイル
   ```

4. 各ファイルに以下の内容で雛形を作成してください。
   - `index.js`: モジュールのエクスポート定義
   - `<機能名>.js`: メインの実装クラスまたは関数の雛形
   - `<機能名>.test.js`: テストケースの雛形

5. 作成したファイルと次のステップを日本語で報告してください。
"""
