description = "プロジェクトのリンターエラーをチェックし、自動修正可能なエラーを修正します。"

prompt = """
現在のプロジェクトに対して、以下の手順でリンターエラーのチェックと修正を行ってください。

# 手順

1. プロジェクトで使用している言語・フレームワークを確認してください。
   - `package.json` が存在する場合: Node.js / TypeScript プロジェクト
   - `requirements.txt` または `Pipfile` が存在する場合: Python プロジェクト
   - `Cargo.toml` が存在する場合: Rust プロジェクト

2. 対応するリンターを実行してエラーを確認してください。
   - Node.js / TypeScript: `npm run lint` を実行し、エラーを確認する
   - Python: `flake8 .` を実行し、エラーを確認する
   - Rust: `cargo clippy -- -D warnings` を実行し、エラーを確認する

3. 自動修正可能なエラーがあれば修正してください。
   - Node.js / TypeScript: `npm run lint:fix` および `npm run format:fix` を実行する
   - Python: `black .` および `isort .` を実行する
   - Rust: `cargo fmt` を実行する

4. 修正後に再度リンターを実行し、エラーが0件であることを確認してください。

5. 手動での修正が必要なエラーが残っている場合は、ファイル名・行番号・修正方法を日本語で報告してください。
"""
